<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Tarshid</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --text: #1a1f36;
            --error: #ef4444;
            --border: #e6e9ef;
            --radius: 14px;
        }

        [data-theme="dark"] {
            --bg: #0a0f1c;
            --surface: #131a2b;
            --text: #f1f5f9;
            --border: #232c40;
        }

        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            font-family: "Inter", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .icon {
            width: 64px;
            height: 64px;
            color: var(--error);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        p {
            color: var(--text);
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .mac-display {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 20px 0;
            word-break: break-all;
        }

        .contact {
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="card">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h1>Access Denied</h1>
        <p>You are not authorized to access this system. Please contact your administrator to request access.</p>

        <div class="mac-display">
            <strong>Your Device MAC:</strong><br>
            <span id="deviceMac">Loading...</span>
        </div>

        <p class="contact">
            Share this MAC address with your admin for access approval.
        </p>
    </div>

    <script>
        setInterval(() => {
            fetch('/api/auth/status')
                .then(r => r.json())
                .then(d => {
                    if (d.authenticated) {
                        window.location.href = "/";
                    }
                });
        }, 3000);
        fetch('/api/auth/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('deviceMac').textContent = d.mac || 'Unknown';
            })
            .catch(() => {
                document.getElementById('deviceMac').textContent = 'Unable to detect';
            });
    </script>
</body>

</html>
