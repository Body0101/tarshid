[platformio]
src_dir = SmartHomeAutomation/src
data_dir = SmartHomeAutomation/data

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
  ; JSON parsing/serialization for state, commands, and LittleFS log payloads
  bblanchon/ArduinoJson@^7.1.0
  ; WebSocketsServer.h provider for realtime browser communication
  links2004/WebSockets@^2.6.1
